<aside class="bg-dark" id="partners">
    <div class="container text-center">
        <h2 class="section-heading">Supporters</h2>
        <hr class="light">
        <div class="row">
            <div class="col-md-10 col-md-offset-1">
                <div id="partnerCarousel" class="carousel slide" data-ride="carousel" data-interval="false"
                    style="padding: 20px 0;">
                    <div class="carousel-inner" role="listbox">
                        <div class="item active">
                            <div class="row">
                                {% for partner in site.data.partners %}
                                <div class="col-sm-4 col-xs-6" style="margin-bottom: 15px;">
                                    <a href="{{ partner.url }}" target="_blank" title="{{ partner.name }}">
                                        <img src="{{ partner.logo }}" class="partner-logo img-responsive center-block"
                                            alt="{{ partner.name }}">
                                    </a>
                                </div>
                                {% assign mod = forloop.index | modulo: 3 %}
                                {% if mod == 0 and forloop.last == false %}
                            </div>
                        </div>
                        <div class="item">
                            <div class="row">
                                {% endif %}
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                    <a class="left carousel-control" href="#partnerCarousel" role="button" data-slide="prev"
                        style="background-image: none; width: 5%;">
                        <i class="fa fa-chevron-left" aria-hidden="true"
                            style="position: absolute; top: 50%; transform: translateY(-50%); left: 0;"></i>
                        <span class="sr-only">Previous</span>
                    </a>
                    <a class="right carousel-control" href="#partnerCarousel" role="button" data-slide="next"
                        style="background-image: none; width: 5%;">
                        <i class="fa fa-chevron-right" aria-hidden="true"
                            style="position: absolute; top: 50%; transform: translateY(-50%); right: 0;"></i>
                        <span class="sr-only">Next</span>
                    </a>
                </div>
                <p class="text-faded"></p>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSeDPVcBTkAEHh_ETHUBiZu2TZoDQJDy8X_FaDfcQ2W756ycfA/viewform?usp=header
                    class=" btn btn-default btn-xl">Get involved</a>
            </div>
        </div>
</aside>
